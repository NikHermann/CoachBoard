<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <title>CoachBoard DB Viewer</title>
</head>

<body>
  <h1>CoachBoard Datenbank</h1>

  <!-- Allgemeine Aktionen -->
  <button id="reload-btn">Neu laden</button>
  <button id="create-user-btn">User erstellen</button>
  <button id="create-training-btn">Training erstellen</button>
  <button id="create-exercise-btn">Exercise erstellen</button>

  <h2>Auth</h2>

  <!-- Login / Logout -->
  <div>
    <input id="login-email" type="email" placeholder="E-Mail" />
    <input id="login-password" type="password" placeholder="Passwort" />
    <button id="login-btn">Login</button>
    <button id="logout-btn">Logout</button>
  </div>

  <!-- E-Mail-Verifikation -->
  <div style="margin-top: 10px;">
    <button id="verify-email-btn">Verifikationsmail senden</button>
    <button id="check-verification-btn">Verifikation prüfen</button>
  </div>

  <!-- Passwort-Funktionen -->
  <div style="margin-top: 10px;">
    <input id="current-password" type="password" placeholder="Aktuelles Passwort" />
    <input id="new-password" type="password" placeholder="Neues Passwort" />
    <button id="change-password-btn">Eigenes Passwort ändern</button>
    <button id="reset-password-btn">Reset-Mail senden</button>
  </div>

  <h2>Users</h2>
  <div id="users-list"></div>

  <h2>Trainings</h2>
  <div id="trainings-list"></div>

  <h2>Exercises</h2>
  <div id="exercises-list"></div>

  <!-- Einstiegspunkt der App -->
  <script type="module" src="./main.js"></script>
</body>

</html>
